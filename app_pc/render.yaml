services:
  - type: web
    name: deepfake-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60 --preload
    envVars:
      - key: REDIS_URL
        fromService:
          name: deepfake-redis
          type: redis
          property: connectionString
      - key: MODEL_PATH
        value: models/alpha.pkl
      - key: CONFIG_PATH
        value: config.yaml

  - type: worker
    name: deepfake-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A server.celery_app worker --loglevel=info --concurrency=1
    envVars:
      - key: REDIS_URL
        fromService:
          name: deepfake-redis
          type: redis
          property: connectionString
      - key: MODEL_PATH
        value: models/alpha.pkl
      - key: CONFIG_PATH
        value: config.yaml

  - type: redis
    name: deepfake-redis
    plan: free
    maxmemoryPolicy: allkeys-lru